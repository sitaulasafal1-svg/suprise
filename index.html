<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* PHONE FRAME */
.phone {
  width: 100%;
  max-width: 420px; /* typical phone width */
  aspect-ratio: 9 / 16;
  overflow: hidden;
  position: relative;
}

/* IMAGE */
.phone img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<div class="phone">
  <img src="sky.jpg">
</div>

</body>
</html>
