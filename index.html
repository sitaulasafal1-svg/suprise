<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Surprise</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 3rem;
      opacity: 0;
      transform: scale(0.3);
      animation: pop 2s ease forwards;
    }

    @keyframes pop {
      0% { opacity: 0; transform: scale(0.3); }
      70% { transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

<h1 id="text">🎁 Opening...</h1>

<script>
setTimeout(() => {
  document.getElementById("text").innerHTML = "💖 Hello Baby 💖";
}, 2000);
</script>

</body>
</html>
